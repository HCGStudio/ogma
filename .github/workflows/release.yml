name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: Publish package to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Build package
        run: yarn workspace @hcgstudio/ogma build

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          package_version="$(node -p "require('./packages/ogma/package.json').version")"
          tag_version="${RELEASE_TAG#v}"

          if [ "$tag_version" != "$package_version" ]; then
            echo "Release tag ($RELEASE_TAG) does not match packages/ogma version ($package_version)." >&2
            echo "Update packages/ogma/package.json or publish the release with tag v$package_version." >&2
            exit 1
          fi

      - name: Publish package
        working-directory: packages/ogma
        run: yarn npm publish --access public --provenance
